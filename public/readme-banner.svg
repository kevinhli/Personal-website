<svg width="1400" height="420" viewBox="0 0 1400 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Kevin Liu Portfolio Banner</title>
  <desc id="desc">A swim-themed banner with deep blue gradients, lane lines, and portfolio details.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1400" y2="420" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#03111f"/>
      <stop offset="0.45" stop-color="#07395f"/>
      <stop offset="1" stop-color="#11a6bf"/>
    </linearGradient>
    <linearGradient id="panel" x1="874" y1="86" x2="1274" y2="344" gradientUnits="userSpaceOnUse">

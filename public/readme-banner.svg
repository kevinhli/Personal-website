    <path d="M72 344H1328" stroke="#7BE7F7" stroke-width="5" stroke-linecap="round" stroke-dasharray="20 18"/>
    <path d="M72 372H1328" stroke="#F6C453" stroke-width="5" stroke-linecap="round" stroke-dasharray="20 18"/>
